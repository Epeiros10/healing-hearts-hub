[build]
  publish = "dist"

# SPA fallback for client-side routes. Real static files in dist/,
# including sitemap.xml and robots.txt, are served by Netlify before this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
